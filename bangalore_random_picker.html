<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bangalore Random Picker</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0e;
    --surface: #181818;
    --border: #2a2a2a;
    --accent: #e8ff4d;
    --accent-dim: #b8cc30;
    --text: #f0f0f0;
    --muted: #888;
    --tag-bg: #222;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 4rem;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  .eyebrow {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  h1 {
    font-size: clamp(2rem, 6vw, 3.5rem);
    font-weight: 800;
    line-height: 1;
    letter-spacing: -0.02em;
  }

  h1 span {
    color: var(--accent);
  }

  .sub {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    margin-top: 0.75rem;
  }

  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    max-width: 700px;
    margin-bottom: 2rem;
  }

  .filters.mobile-scroll {
    justify-content: flex-start;
    flex-wrap: nowrap;
    overflow-x: auto;
    overflow-y: hidden;
    padding-bottom: 0.3rem;
    scrollbar-width: thin;
    scrollbar-color: #3a3a3a transparent;
  }

  .filters.mobile-scroll::-webkit-scrollbar {
    height: 6px;
  }

  .filters.mobile-scroll::-webkit-scrollbar-thumb {
    background: #3a3a3a;
    border-radius: 999px;
  }

  .filter-group {
    width: 100%;
    max-width: 700px;
    margin-bottom: 1.15rem;
  }

  .search-wrap {
    width: 100%;
    max-width: 680px;
    margin-bottom: 1.35rem;
  }

  .hero-panel {
    width: 100%;
    max-width: 680px;
    margin-bottom: 1.5rem;
  }

  .search-box {
    width: 100%;
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 1rem 1rem;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.03em;
    outline: none;
  }

  .search-box:focus {
    border-color: var(--accent);
  }

  .filter-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
    margin-bottom: 0.65rem;
  }

  .filter-btn {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    padding: 6px 14px;
    white-space: nowrap;
    flex: 0 0 auto;
    border-radius: 2px;
    border: 1px solid var(--border);
    background: var(--tag-bg);
    color: var(--muted);
    cursor: pointer;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    transition: all 0.15s;
  }

  .filter-btn:hover { border-color: #444; color: var(--text); }

  .filter-btn.active {
    background: var(--accent);
    color: #0e0e0e;
    border-color: var(--accent);
    font-weight: 700;
  }

  .card-wrap {
    width: 100%;
    max-width: 680px;
    margin-bottom: 1.5rem;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2rem 2rem 1.75rem;
    min-height: 200px;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    position: relative;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .card.spinning {
    border-color: var(--accent);
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 3px;
    height: 100%;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .card.spinning::before { opacity: 1; }

  .card-cat {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
  }

  .card-name {
    font-size: clamp(1.4rem, 4vw, 2rem);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.01em;
  }

  .card-name.placeholder {
    color: var(--muted);
    font-weight: 400;
    font-size: 1.1rem;
  }

  .card-desc {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: #aaa;
    line-height: 1.7;
  }

  .card-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: auto;
    padding-top: 0.5rem;
    border-top: 1px solid var(--border);
  }

  .pill {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 2px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .pill-dist { background: #1e1e1e; color: #888; border: 1px solid #2a2a2a; }
  .pill-budget { background: #1a2010; color: #8bc34a; border: 1px solid #2a3a18; }
  .pill-type { background: #101820; color: #4fc3f7; border: 1px solid #182a38; }
  .pill-area { background: #20161a; color: #ff9eb5; border: 1px solid #3c2129; }
  .pill-rating { background: #231f10; color: #ffd54f; border: 1px solid #463b12; }

  .card-actions {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .action-btn {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-decoration: none;
    color: #0e0e0e;
    background: var(--accent);
    padding: 10px 14px;
    border-radius: 2px;
    border: 1px solid var(--accent);
    transition: background 0.15s, transform 0.1s;
    cursor: pointer;
  }

  .action-btn:hover {
    background: #d4eb3a;
  }

  .spin-btn {
    width: 100%;
    padding: 1.1rem 2rem;
    background: var(--accent);
    color: #0e0e0e;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 800;
    letter-spacing: 0.04em;
    border: none;
    border-radius: 2px;
    cursor: pointer;
    text-transform: uppercase;
    transition: background 0.15s, transform 0.1s;
  }

  .spin-btn:hover { background: #d4eb3a; }
  .spin-btn:active { transform: scale(0.98); }

  .counter {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    margin-top: 1rem;
    letter-spacing: 0.05em;
  }

  @keyframes flash {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  .flashing { animation: flash 0.08s ease 3; }

  @media (max-width: 720px) {
    body {
      padding: 1.2rem 0.85rem 3rem;
    }

    header {
      margin-bottom: 1.4rem;
    }

    .filter-group {
      margin-bottom: 0.95rem;
    }

    .filter-label {
      text-align: left;
      margin-bottom: 0.45rem;
      padding-left: 0.1rem;
    }

    .filters {
      max-width: 100%;
      margin-bottom: 0;
    }

    .filter-btn {
      font-size: 10px;
      padding: 8px 12px;
    }

    .card {
      padding: 1.2rem 1rem 1rem;
      min-height: 180px;
    }

    .card-actions {
      justify-content: stretch;
    }

    .action-btn {
      flex: 1 1 140px;
      text-align: center;
    }

    .counter {
      text-align: left;
    }
  }
</style>
</head>
<body>

<header>
  <p class="eyebrow">Namma Bengaluru</p>
  <h1>Where to go<br><span>this weekend?</span></h1>
  <p class="sub">// <span id="total-count"></span> spots &mdash; category, area &amp; maps</p>
</header>

<div class="search-wrap">
  <input class="search-box" id="search-box" type="text" placeholder="Search by place name or area..." aria-label="Search places">
</div>

<div class="hero-panel">
  <div class="card-wrap">
    <div class="card" id="card">
      <div class="card-cat" id="c-cat">&nbsp;</div>
      <div class="card-name placeholder" id="c-name">Hit spin to get your spot</div>
      <div class="card-desc" id="c-desc">Filter by category or go full random. Every spin is a weekend sorted.</div>
      <div class="card-pills" id="c-pills"></div>
      <div class="card-actions">
        <button class="action-btn" id="share-btn" type="button">Share</button>
        <a class="action-btn" id="c-map" href="https://www.google.com/maps/search/Bangalore" target="_blank" rel="noopener noreferrer">Open in Maps</a>
      </div>
    </div>
  </div>

  <button class="spin-btn" onclick="spin()">Spin a random place &rarr;</button>
  <div class="counter" id="counter"></div>
</div>

<div class="filter-group">
  <div class="filter-label">Category</div>
  <div class="filters mobile-scroll" id="filters"></div>
</div>

<div class="filter-group">
  <div class="filter-label">Area</div>
  <div class="filters mobile-scroll" id="area-filters"></div>
</div>

  {name:"Interactive Gaming Cafe", cat:"Activities", desc:"A casual hybrid of board games, consoles, and cafe time.", budget:"₹250–600/person", dist:"JP Nagar", type:"Gaming"}
];

const rawPlaces = [...basePlaces, ...extraPlaces, ...morePlaces];

const cats = ["All", "Food & Cafes", "Parks & Nature", "Heritage & Temples", "Scenic & Viewpoints", "Long Rides", "Activities", "Culture & Art", "Markets & Streets", "Hidden Gems"];
const areas = ["All Areas", "Indiranagar", "Koramangala", "Jayanagar", "JP Nagar", "Basavanagudi", "Malleshwaram", "MG Road", "Church Street", "Whitefield", "HSR Layout", "BTM Layout", "Rajajinagar", "Shivajinagar", "Hebbal", "Yelahanka", "Ulsoor", "Vasanth Nagar", "Frazer Town", "Sarjapur Road", "Bannerghatta Road", "Electronic City", "Kanakapura Road", "Central Bangalore", "Outskirts"];

let activeFilter = "All";
let activeArea = "All Areas";
let lastPlaceKey = "";
let activeSearch = "";
let currentPlace = null;

const filtersEl = document.getElementById("filters");
const areaFiltersEl = document.getElementById("area-filters");
const searchBoxEl = document.getElementById("search-box");
const shareBtnEl = document.getElementById("share-btn");

const areaKeywordMap = {
  "Indiranagar": "Indiranagar",
  "Domlur": "Indiranagar",
  "Old Airport Road": "Indiranagar",
  "HAL": "Indiranagar",
  "Ulsoor": "Ulsoor",
  "MG Road": "MG Road",
  "Church Street": "Church Street",
  "Brigade Road": "Central Bangalore",
  "Residency Road": "Central Bangalore",
  "Lavelle Road": "Central Bangalore",
  "St. Mark's Road": "Central Bangalore",
  "Museum Road": "Central Bangalore",
  "UB City": "Central Bangalore",
  "Kasturba Road": "Central Bangalore",
  "Cubbon Park": "Central Bangalore",
  "Vasanth Nagar": "Vasanth Nagar",
  "Shivajinagar": "Shivajinagar",
  "Frazer Town": "Frazer Town",
  "Cox Town": "Central Bangalore",
  "Cooke Town": "Central Bangalore",
  "Richards Town": "Central Bangalore",
  "Jayamahal": "Central Bangalore",

  "Gandhinagar": "Central Bangalore",
  "Majestic": "Central Bangalore",

  "KR Market": "Central Bangalore",
  "Sultanpet": "Central Bangalore",
  "SP Road": "Central Bangalore",
  "Koramangala": "Koramangala",

  "JP Nagar": "JP Nagar",

  "Basavanagudi": "Basavanagudi",

  "Bannerghatta": "Bannerghatta Road",

function inferArea(place) {
  const text = `${place.name} ${place.dist} ${place.desc}`.toLowerCase();
  for (const [keyword, area] of Object.entries(areaKeywordMap)) {
    if (text.includes(keyword.toLowerCase())) return area;
  }

  if (/\b\d+\s*km\b/.test(text) || text.includes("outskirts")) return "Outskirts";
  if (text.includes("in city") || text.includes("central bangalore")) return "Central Bangalore";
  if (text.includes("north bangalore")) return "North Bangalore";
  if (text.includes("east bangalore")) return "East Bangalore";
  if (text.includes("south")) return "South Bangalore";

  return "Outskirts";
}

function createMapsUrl(place) {
  return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(`${place.name}, ${place.dist}, Bangalore`)}`;
}

function createStableRating(place) {
  const seed = `${place.name}${place.dist}${place.type}`;
  let hash = 0;
  for (let i = 0; i < seed.length; i += 1) {
    hash = (hash * 31 + seed.charCodeAt(i)) % 1000;
  }
  const base = 4.0 + (hash % 10) / 10;
  const capped = Math.min(4.9, Math.max(4.0, base));
  return capped.toFixed(1);
}

const places = rawPlaces.map(place => ({
  ...place,
  area: inferArea(place),
  mapUrl: createMapsUrl(place),
  rating: createStableRating(place),
  searchText: `${place.name} ${place.dist} ${place.area || ""} ${place.cat} ${place.type}`.toLowerCase()
}));

document.getElementById("total-count").textContent = places.length;

function renderFilterGroup(container, options, activeValue, onClick) {
  container.innerHTML = "";
  options.forEach(option => {
    const btn = document.createElement("button");
    btn.className = "filter-btn" + (option === activeValue ? " active" : "");
    btn.textContent = option;
    btn.onclick = () => onClick(option);
    container.appendChild(btn);
  });
}

function rerenderFilters() {
  renderFilterGroup(filtersEl, cats, activeFilter, option => {
    activeFilter = option;
    updateCounter();
  });

  renderFilterGroup(areaFiltersEl, areas, activeArea, option => {
    activeArea = option;
    updateCounter();
  });
}

function getFilteredPlaces() {
  return places.filter(place => {
    const categoryMatch = activeFilter === "All" || place.cat === activeFilter;
    const areaMatch = activeArea === "All Areas" || place.area === activeArea;
    const searchMatch = !activeSearch || place.searchText.includes(activeSearch);
    return categoryMatch && areaMatch && searchMatch;
  });
}

function renderEmptyState() {
  currentPlace = null;
  document.getElementById("c-cat").textContent = "NO MATCH";
  const nameEl = document.getElementById("c-name");
  nameEl.textContent = "No places match this combo";
  nameEl.classList.add("placeholder");
  document.getElementById("c-desc").textContent = "Try changing the category, area, or search term to widen the pool.";
  document.getElementById("c-pills").innerHTML = "";
  document.getElementById("c-map").href = "https://www.google.com/maps/search/Bangalore";
}

function renderPlace(place) {
  currentPlace = place;
  document.getElementById("c-cat").textContent = `${place.cat} / ${place.area}`;

  const nameEl = document.getElementById("c-name");
  nameEl.textContent = place.name;
  nameEl.classList.remove("placeholder");

  document.getElementById("c-desc").textContent = place.desc;
  document.getElementById("c-pills").innerHTML =
    `<span class="pill pill-dist">${place.dist}</span>` +
    `<span class="pill pill-budget">${place.budget}</span>` +
    `<span class="pill pill-type">${place.type}</span>` +
    `<span class="pill pill-area">${place.area}</span>` +
    `<span class="pill pill-rating">${place.rating} ★</span>`;
  document.getElementById("c-map").href = place.mapUrl;
}

function spin() {
  const pool = getFilteredPlaces();
  if (!pool.length) {
    renderEmptyState();
    updateCounter();
    return;
  }

  let idx;
  do { idx = Math.floor(Math.random() * pool.length); } while (pool.length > 1 && pool[idx].name === lastPlaceKey);
  const place = pool[idx];
  lastPlaceKey = place.name;

  const card = document.getElementById("card");
  card.classList.add("spinning", "flashing");
  setTimeout(() => card.classList.remove("flashing"), 300);
  setTimeout(() => card.classList.remove("spinning"), 600);

  renderPlace(place);
  updateCounter();
}

function updateCounter() {
  rerenderFilters();
  const pool = getFilteredPlaces();
  document.getElementById("counter").textContent =
    `${pool.length} places in pool • ${activeArea}${activeSearch ? ` • "${activeSearch}"` : ""}`;

  if (!pool.length) {
    renderEmptyState();
  }
}

function buildShareText(place) {
  return `${place.name} • ${place.cat} • ${place.area} • ${place.rating}★
${place.desc}
Maps: ${place.mapUrl}`;
}

async function shareCurrentPlace() {
  if (!currentPlace) return;

  const shareData = {
    title: currentPlace.name,
    text: buildShareText(currentPlace),
    url: currentPlace.mapUrl
  };

  try {
    if (navigator.share) {
      await navigator.share(shareData);
      return;
    }

    if (navigator.clipboard && navigator.clipboard.writeText) {
      await navigator.clipboard.writeText(buildShareText(currentPlace));
      shareBtnEl.textContent = "Copied";
      setTimeout(() => {
        shareBtnEl.textContent = "Share";
      }, 1200);
    }
  } catch (error) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      await navigator.clipboard.writeText(buildShareText(currentPlace));
      shareBtnEl.textContent = "Copied";
      setTimeout(() => {
        shareBtnEl.textContent = "Share";
      }, 1200);
    }
  }
}

searchBoxEl.addEventListener("input", event => {
  activeSearch = event.target.value.trim().toLowerCase();
  updateCounter();
});

shareBtnEl.addEventListener("click", () => {
  shareCurrentPlace();
});

updateCounter();
</script>
